# Gemini-style upstream providers
# Preferred for Gemini-style requests sent to http://127.0.0.1:3333/clipal
# Legacy alias: http://127.0.0.1:3333/gemini

mode: auto # auto | manual
pinned_provider: "" # required when mode=manual

providers:
  # Primary provider - Google AI Studio / Gemini API
  - name: "google-ai-studio"
    base_url: "https://generativelanguage.googleapis.com"
    api_key: "AIza-xxx"
    priority: 1
    enabled: true

  # Google Vertex AI Gemini REST API.
  # Put an OAuth access token or service-account token in api_key/api_keys.
  # Clipal sends it as Authorization: Bearer ... for aiplatform.googleapis.com hosts.
  - name: "vertex-gemini"
    base_url: "https://us-central1-aiplatform.googleapis.com"
    api_key: "ya29.xxx"
    priority: 2
    enabled: false

  # Google personal OAuth for Gemini-compatible requests now uses Antigravity.
  - name: "antigravity-oauth"
    auth_type: oauth
    oauth_provider: antigravity
    oauth_ref: "antigravity-account-ref"
    priority: 3
    enabled: false

  # Fallback provider - OpenRouter (Gemini models available)
  - name: "openrouter"
    base_url: "https://openrouter.ai/api"
    api_keys:
      - "sk-or-xxx"
      - "sk-or-yyy"
    priority: 4
    enabled: true
