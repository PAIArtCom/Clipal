name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Sync npm package versions from tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          npm pkg set version="$VERSION" --prefix packaging/npm
          npm pkg set version="$VERSION" --prefix packaging/npm-paiart

      - name: Build binaries
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}" ./scripts/build.sh

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build/release
          mkdir -p build/release

          cp build/darwin-amd64/clipal      build/release/clipal-darwin-amd64
          cp build/darwin-arm64/clipal      build/release/clipal-darwin-arm64
          cp build/linux-amd64/clipal       build/release/clipal-linux-amd64
          cp build/linux-arm64/clipal       build/release/clipal-linux-arm64
          cp build/windows-amd64/clipal.exe build/release/clipal-windows-amd64.exe
          cp build/windows-arm64/clipal.exe build/release/clipal-windows-arm64.exe

          chmod +x build/release/clipal-darwin-amd64 build/release/clipal-darwin-arm64 build/release/clipal-linux-amd64 build/release/clipal-linux-arm64

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/gen_checksums.sh build/release > build/release/checksums.txt
          cat build/release/checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          release_args=(
            "${GITHUB_REF_NAME}"
            build/release/*
            --title "${GITHUB_REF_NAME}"
            --notes-file "release-notes/${GITHUB_REF_NAME}.md"
          )

          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            release_args+=(--prerelease)
          fi

          gh release create "${release_args[@]}"

      - name: Publish npm package clipal
        working-directory: packaging/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if npm view "clipal@${VERSION}" version >/dev/null 2>&1; then
            echo "clipal@${VERSION} already exists on npm; skipping publish"
            exit 0
          fi
          npm publish --provenance

      - name: Publish npm package @paiart/clipal
        working-directory: packaging/npm-paiart
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if npm view "@paiart/clipal@${VERSION}" version >/dev/null 2>&1; then
            echo "@paiart/clipal@${VERSION} already exists on npm; skipping publish"
            exit 0
          fi
          npm publish --provenance --access public
